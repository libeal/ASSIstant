name: Remote Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布或校验的 Git tag，例如 v0.1.4"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: remote-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Check out release tooling for manual reruns
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Preserve release publisher for manual reruns
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: cp scripts/publish-remote-release.sh "${RUNNER_TEMP}/publish-remote-release.sh"

      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Validate release tag
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo "::error title=Invalid release tag::${RELEASE_TAG}"
            exit 1
          fi

      - name: Install lint tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          # shfmt via Go module cache is optional; skip if unavailable.
          curl -fsSL https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_amd64 -o /usr/local/bin/shfmt \
            && chmod +x /usr/local/bin/shfmt || echo "shfmt install skipped"
          python3 -m pip install --quiet pyflakes || echo "pyflakes install skipped"

      - name: Run syntax and lint checks
        run: bash scripts/lint.sh

      - name: Run regression suite
        run: |
          for test_file in \
            tests/policy.sh \
            tests/tools.sh \
            tests/context.sh \
            tests/security.sh \
            tests/workflow.sh \
            tests/observer.sh \
            tests/smoke.sh \
            tests/mcp.sh \
            tests/contract.sh \
            tests/web_api.sh \
            tests/web_server.sh \
            tests/interactive.sh \
            tests/remote_release.sh \
            tests/remote_runtime.sh \
            tests/remote_web_security.sh \
            tests/backup.sh; do
            echo "::group::${test_file}"
            if ! bash "${test_file}"; then
              echo "::error title=Regression failed::${test_file} failed"
              exit 1
            fi
            echo "::endgroup::"
          done

      - name: Build deterministic remote assets
        env:
          SOURCE_DATE_EPOCH: "0"
        run: bash scripts/build-remote-release.sh "${RELEASE_TAG}" dist/remote

      - name: Publish and verify tag assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          publisher="scripts/publish-remote-release.sh"
          if [[ ! -f "${publisher}" ]]; then
            publisher="${RUNNER_TEMP}/publish-remote-release.sh"
          fi
          bash "${publisher}" "${RELEASE_TAG}" dist/remote

      - name: Smoke test published CLI entrypoint
        run: |
          curl -fsSL --proto '=https' --tlsv1.2 "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/linux-agent-cli.sh" \
            | LINUX_AGENT_VERSION="${RELEASE_TAG}" bash -s -- doctor \
            | jq -e '.ok == true and .remote.enabled == true'

      - name: Smoke test published Web entrypoint
        run: |
          web_stdout="${RUNNER_TEMP}/linux-agent-web.stdout"
          web_stderr="${RUNNER_TEMP}/linux-agent-web.stderr"
          (
            curl -fsSL --proto '=https' --tlsv1.2 "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/linux-agent-web.sh" \
              | LINUX_AGENT_VERSION="${RELEASE_TAG}" bash
          ) >"${web_stdout}" 2>"${web_stderr}" &
          web_pid="$!"
          trap 'kill -TERM "${web_pid}" 2>/dev/null || true; wait "${web_pid}" 2>/dev/null || true' EXIT
          for _ in $(seq 1 100); do
            token_file=""
            for runtime_base in "${XDG_RUNTIME_DIR:-}" /dev/shm /tmp; do
              [[ -n "${runtime_base}" && -d "${runtime_base}" ]] || continue
              token_file="$(find "${runtime_base}" -maxdepth 5 -type f -path '*/linux-agent-remote.*/agent/tmp/web/auth-token' -print -quit 2>/dev/null || true)"
              [[ -n "${token_file}" ]] && break
            done
            token=""
            if [[ -n "${token_file}" ]]; then
              token="$(<"${token_file}")"
            fi
            if [[ -n "${token}" ]] && curl -fsS -H "Authorization: Bearer ${token}" http://127.0.0.1:8765/api/health \
              | jq -e '.ok == true and .remote.enabled == true' >/dev/null; then
              curl -fsS -X POST -H "Authorization: Bearer ${token}" -H "Content-Type: application/json" \
                -d '{"skill":"os-deep-inspect"}' http://127.0.0.1:8765/api/skills/materialize \
                | jq -e '.ok == true and .status == "skill_materialized"' >/dev/null
              backup_file="${RUNNER_TEMP}/linux-agent-runtime-backup.tar.gz"
              curl -fsS -H "Authorization: Bearer ${token}" \
                -o "${backup_file}" http://127.0.0.1:8765/api/runtime/backup
              gzip -t "${backup_file}"
              curl -fsS -X POST -H "Authorization: Bearer ${token}" -H "Content-Type: application/json" \
                -d '{}' http://127.0.0.1:8765/api/server/shutdown >/dev/null
              wait "${web_pid}"
              trap - EXIT
              exit 0
            fi
            sleep 0.2
          done
          cat "${web_stderr}" >&2
          exit 1
