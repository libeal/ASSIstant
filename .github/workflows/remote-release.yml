name: Remote Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Run syntax checks
        run: |
          bash -n bin/agent bin/agent-web test_config.sh lib/*.sh remote/*.sh scripts/*.sh tests/*.sh skills/*/scripts/*.sh
          python3 -m py_compile lib/command_guard.py lib/mcp_client.py web/server.py tests/fake_ai_server.py tests/fake_mcp_server.py
          node --check web/static/app.js

      - name: Run regression suite
        run: |
          for test_file in \
            tests/policy.sh \
            tests/tools.sh \
            tests/context.sh \
            tests/security.sh \
            tests/workflow.sh \
            tests/observer.sh \
            tests/smoke.sh \
            tests/mcp.sh \
            tests/web_api.sh \
            tests/web_server.sh \
            tests/interactive.sh \
            tests/remote_release.sh \
            tests/remote_runtime.sh \
            tests/remote_web_security.sh \
            tests/backup.sh; do
            echo "::group::${test_file}"
            if ! bash "${test_file}"; then
              echo "::error title=Regression failed::${test_file} failed"
              exit 1
            fi
            echo "::endgroup::"
          done

      - name: Build deterministic remote assets
        env:
          SOURCE_DATE_EPOCH: "0"
        run: bash scripts/build-remote-release.sh "${GITHUB_REF_NAME}" dist/remote

      - name: Publish immutable tag assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "::error title=Release already exists::${GITHUB_REF_NAME} already has a Release; publish a new tag instead of overwriting immutable assets"
            exit 1
          fi
          gh release create "${GITHUB_REF_NAME}" dist/remote/* --verify-tag --generate-notes --latest

      - name: Smoke test published CLI entrypoint
        run: |
          curl -fsSL "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/linux-agent-cli.sh" \
            | LINUX_AGENT_VERSION="${GITHUB_REF_NAME}" bash -s -- doctor \
            | jq -e '.ok == true and .remote.enabled == true'

      - name: Smoke test published Web entrypoint
        run: |
          web_stdout="${RUNNER_TEMP}/linux-agent-web.stdout"
          web_stderr="${RUNNER_TEMP}/linux-agent-web.stderr"
          (
            curl -fsSL "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/linux-agent-web.sh" \
              | LINUX_AGENT_VERSION="${GITHUB_REF_NAME}" bash
          ) >"${web_stdout}" 2>"${web_stderr}" &
          web_pid="$!"
          trap 'kill -TERM "${web_pid}" 2>/dev/null || true; wait "${web_pid}" 2>/dev/null || true' EXIT
          for _ in $(seq 1 100); do
            token="$(sed -n 's/.*Authorization Bearer token: //p' "${web_stderr}" | tail -n 1)"
            if [[ -n "${token}" ]] && curl -fsS -H "Authorization: Bearer ${token}" http://127.0.0.1:8765/api/health \
              | jq -e '.ok == true and .remote.enabled == true' >/dev/null; then
              curl -fsS -X POST -H "Authorization: Bearer ${token}" -H "Content-Type: application/json" \
                -d '{"skill":"os-deep-inspect"}' http://127.0.0.1:8765/api/skills/materialize \
                | jq -e '.ok == true and .status == "skill_materialized"' >/dev/null
              backup_file="${RUNNER_TEMP}/linux-agent-runtime-backup.tar.gz"
              curl -fsS -H "Authorization: Bearer ${token}" \
                -o "${backup_file}" http://127.0.0.1:8765/api/runtime/backup
              gzip -t "${backup_file}"
              curl -fsS -X POST -H "Authorization: Bearer ${token}" -H "Content-Type: application/json" \
                -d '{}' http://127.0.0.1:8765/api/server/shutdown >/dev/null
              wait "${web_pid}"
              trap - EXIT
              exit 0
            fi
            sleep 0.2
          done
          cat "${web_stderr}" >&2
          exit 1
